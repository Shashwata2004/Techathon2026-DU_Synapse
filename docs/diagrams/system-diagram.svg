<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f4f7fb"/>
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17202a">Smart Office Monitor System Diagram</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#344054"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #98a2b3; stroke-width: 3; rx: 14; }
      .core { fill: #e0f2fe; stroke: #2e90fa; stroke-width: 4; rx: 14; }
      .sub { fill: #f0fdf4; stroke: #12b76a; stroke-width: 3; rx: 12; }
      .user { fill: #fff7ed; stroke: #f79009; stroke-width: 3; rx: 14; }
      .title { font: 700 22px Arial, sans-serif; fill: #17202a; }
      .small { font: 16px Arial, sans-serif; fill: #475467; }
      .line { stroke: #344054; stroke-width: 4; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect class="box" x="60" y="245" width="215" height="120"/>
  <text class="title" x="168" y="292" text-anchor="middle">Simulated Devices</text>
  <text class="small" x="168" y="323" text-anchor="middle">15 lights and fans</text>

  <rect class="core" x="385" y="145" width="310" height="320"/>
  <text class="title" x="540" y="188" text-anchor="middle">FastAPI Backend</text>
  <text class="small" x="540" y="218" text-anchor="middle">Single Source of Truth</text>
  <rect class="sub" x="420" y="250" width="240" height="52"/>
  <text class="small" x="540" y="282" text-anchor="middle">State Store</text>
  <rect class="sub" x="420" y="322" width="240" height="52"/>
  <text class="small" x="540" y="354" text-anchor="middle">Usage Calculator</text>
  <rect class="sub" x="420" y="394" width="240" height="52"/>
  <text class="small" x="540" y="426" text-anchor="middle">Alert Engine</text>

  <rect class="box" x="815" y="110" width="210" height="98"/>
  <text class="title" x="920" y="150" text-anchor="middle">WebSocket</text>
  <text class="small" x="920" y="178" text-anchor="middle">Live full state</text>

  <rect class="box" x="815" y="300" width="210" height="98"/>
  <text class="title" x="920" y="340" text-anchor="middle">REST API</text>
  <text class="small" x="920" y="368" text-anchor="middle">Bot commands</text>

  <rect class="user" x="935" y="520" width="210" height="98"/>
  <text class="title" x="1040" y="560" text-anchor="middle">Users</text>
  <text class="small" x="1040" y="588" text-anchor="middle">Web and Discord</text>

  <rect class="box" x="65" y="510" width="250" height="86"/>
  <text class="title" x="190" y="548" text-anchor="middle">Demo Controls</text>
  <text class="small" x="190" y="576" text-anchor="middle">Local-only endpoints</text>

  <path class="line" d="M275 305 L385 305"/>
  <path class="line" d="M695 190 L815 160"/>
  <path class="line" d="M695 360 L815 350"/>
  <path class="line" d="M1025 160 C1110 230 1110 440 1040 520"/>
  <path class="line" d="M1025 350 C1100 410 1105 470 1040 520"/>
  <path class="line" d="M315 553 C360 553 370 445 420 420"/>
</svg>
